<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salamat! 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:  #E8537A;
      --blush: #F9E4EC;
      --deep:  #1A0A10;
      --cream: #FFF7F9;
      --muted: #C9929F;
      --card:  #FFFFFF;
    }

    body {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: var(--blush);
      font-family: 'DM Sans', sans-serif;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* Confetti */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall linear infinite;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border-radius: 2rem;
      padding: 3.5rem 2.5rem;
      max-width: 420px; width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(232,83,122,.15), 0 4px 16px rgba(0,0,0,.06);
      animation: popIn .5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
      from { transform: scale(.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .icon { font-size: 4rem; display: block; margin-bottom: 1rem; animation: heartbeat 1.6s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%     { transform: scale(1.18); }
      28%     { transform: scale(1); }
      42%     { transform: scale(1.1); }
      56%     { transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      color: var(--deep); line-height: 1.25; margin-bottom: .75rem;
    }

    .msg {
      color: var(--muted); font-size: .95rem; line-height: 1.6;
      margin-bottom: 2rem;
    }
    .msg span { color: var(--rose); font-weight: 600; }

    .divider {
      border: none; height: 1px;
      background: linear-gradient(to right, transparent, #F0D6DF, transparent);
      margin: 1.5rem 0;
    }

    .footer-note {
      font-size: .78rem; color: #D4A0B0; font-style: italic;
    }

    .btn-home {
      display: inline-block;
      background: transparent;
      color: var(--rose);
      border: 2px solid var(--rose);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 500;
      padding: .7rem 1.8rem;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, color .2s;
      margin-top: .5rem;
    }
    .btn-home:hover { background: var(--rose); color: #fff; }
  </style>
</head>
<body>
  <div class="confetti-wrap" id="confetti"></div>

  <div class="card">
    <span class="icon">💖</span>
    <h1 id="thankTitle">Awww, thank you!</h1>
    <p class="msg" id="thankMsg">
      Alam ko naman yung sagot mo, <span id="nameSpan">friend</span>!<br/>
      Sana maganda araw mo. 🥹<br/><br/>
    </p>
    <hr class="divider" />
    <p class="footer-note">Labyu po HIHIHI. 🌸</p>
    <br/>
    <a class="btn-home" href="index.html">← Back to Home</a>
  </div>

  <script>
    // Show name
    const name = sessionStorage.getItem('userName');
    if (name) {
      document.getElementById('nameSpan').textContent = name;
      document.getElementById('thankTitle').textContent = 'Awww, salamat, ' + name + '!';
    }

    // Confetti
    const colors = ['#E8537A','#F9C6D5','#FFD700','#B5EAD7','#C7CEEA','#FFDAC1'];
    const wrap = document.getElementById('confetti');
    for (let i = 0; i < 50; i++) {
      const d = document.createElement('div');
      d.className = 'confetti-piece';
      d.style.left = Math.random() * 100 + 'vw';
      d.style.background = colors[Math.floor(Math.random() * colors.length)];
      d.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      d.style.width = (6 + Math.random() * 10) + 'px';
      d.style.height = (6 + Math.random() * 10) + 'px';
      d.style.animationDuration = (4 + Math.random() * 6) + 's';
      d.style.animationDelay = (Math.random() * 5) + 's';
      wrap.appendChild(d);
    }
  </script>
</body>
</html>
