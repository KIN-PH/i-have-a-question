<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>May Tanong Ako 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #E8537A;
      --blush:   #F9E4EC;
      --deep:    #1A0A10;
      --cream:   #FFF7F9;
      --muted:   #C9929F;
      --card:    #FFFFFF;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--blush);
      font-family: 'DM Sans', sans-serif;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* floating petals bg */
    .petals {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .petal {
      position: absolute;
      width: 10px; height: 14px;
      background: var(--rose);
      border-radius: 50% 0 50% 0;
      opacity: 0.18;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.18; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(232,83,122,0.15), 0 4px 16px rgba(0,0,0,0.06);
    }

    .icon { font-size: 3.5rem; line-height: 1; margin-bottom: 1.25rem; display: block; animation: heartbeat 1.6s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.15); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.1); }
      56%      { transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2rem);
      color: var(--deep);
      margin-bottom: .5rem;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: var(--rose);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: .85rem 2.5rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 6px 20px rgba(232,83,122,0.35);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,83,122,0.4); }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="petals" id="petals"></div>

  <div class="card">
    <span class="icon">💌</span>
    <h1>Pssst… may tanong ako sa 'yo.</h1>
    <p class="subtitle">Pero bago yan, Ano muna Name mo? 😏</p>
    <a class="btn" href="1.html">Next →</a>
  </div>

  <script>
    const c = document.getElementById('petals');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 8) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.width = (6 + Math.random() * 10) + 'px';
      p.style.height = (8 + Math.random() * 14) + 'px';
      c.appendChild(p);
    }
  </script>
</body>
</html>
